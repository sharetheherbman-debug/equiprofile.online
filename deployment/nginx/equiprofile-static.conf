# ==========================================
# EquiProfile Nginx Configuration (Nginx Serves Static Assets, Node.js Serves HTML)
# ==========================================
# Hybrid configuration for the 2-domain setup:
#
#   equiprofile.online         → Management frontend
#   school.equiprofile.online  → School frontend
#
# Nginx serves hashed static assets directly for performance.
# ALL HTML responses (index.html, SPA routes) are proxied through Node.js,
# which uses the Host header to serve the correct frontend's index.html.
#
# Asset Handling:
#   The build step runs scripts/merge-assets.sh to copy all hashed assets
#   from both builds (management + school) into dist/public/assets/.
#   Since filenames include content hashes, there are no collisions.
#   Both domains use the same merged assets directory.
#
# CONTENT SECURITY POLICY
# ------------------------
# CSP is served as a static header by Nginx using 'unsafe-inline'.  This is
# intentional: nonce-based CSP was removed because stale nonces in SW-cached
# HTML caused blank white screens after deployments.
#
# Installation:
# 1. Replace YOUR_DOMAIN_HERE with your actual domain (e.g., equiprofile.online)
# 2. Update APP_ROOT if your installation is not at /var/www/equiprofile
# 3. Copy to: /etc/nginx/sites-available/equiprofile
# 4. Create symlink: sudo ln -s /etc/nginx/sites-available/equiprofile /etc/nginx/sites-enabled/
# 5. Test config: sudo nginx -t
# 6. Reload: sudo systemctl reload nginx
# 7. Setup SSL: sudo certbot --nginx -d YOUR_DOMAIN_HERE -d school.YOUR_DOMAIN_HERE

# Shared proxy parameters
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Management site: equiprofile.online ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # Root: merged assets directory (contains all hashed assets from both builds)
    root /var/www/equiprofile/dist/public;

    client_max_body_size 50M;

    access_log /var/log/nginx/equiprofile-access.log;
    error_log /var/log/nginx/equiprofile-error.log;

    # ── Hashed assets: serve directly from merged assets directory ──────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri @node;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── School site: school.equiprofile.online ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name school.YOUR_DOMAIN_HERE;

    # Same merged assets directory
    root /var/www/equiprofile/dist/public;

    client_max_body_size 50M;

    access_log /var/log/nginx/equiprofile-school-access.log;
    error_log /var/log/nginx/equiprofile-school-error.log;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri @node;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # Node.js sees Host: school.equiprofile.online and serves school/index.html
    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
