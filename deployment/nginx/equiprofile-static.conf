# ==========================================
# EquiProfile Nginx Configuration (Nginx Serves Static Assets, Node.js Serves HTML)
# ==========================================
# Hybrid configuration: Nginx serves hashed static assets directly for
# performance, but ALL HTML responses (index.html, SPA routes) are proxied
# through Node.js.
#
# WHY HTML MUST GO THROUGH NODE.JS
# ---------------------------------
# HTML delivery is handled by Node.js so that Cache-Control: no-store is set
# on every response.  Nginx serves hashed /assets/* directly with immutable
# caching for performance.
#
# CONTENT SECURITY POLICY
# ------------------------
# CSP is served as a static header by Nginx using 'unsafe-inline'.  This is
# intentional: nonce-based CSP was removed because stale nonces in SW-cached
# HTML caused blank white screens after deployments.  'unsafe-inline' allows
# Vite-generated inline scripts and is safe when combined with frame-ancestors.
# All other security headers are set by Node.js via Helmet.
#
# Cache-Control for index.html is also set by Node.js (no-store).
# Cache-Control for hashed assets (/assets/*) is set here (immutable).
#
# Installation:
# 1. Replace YOUR_DOMAIN_HERE with your actual domain (e.g., equiprofile.online)
# 2. Update APP_ROOT if your installation is not at /var/www/equiprofile
# 3. Copy to: /etc/nginx/sites-available/equiprofile
# 4. Create symlink: sudo ln -s /etc/nginx/sites-available/equiprofile /etc/nginx/sites-enabled/
# 5. Test config: sudo nginx -t
# 6. Reload: sudo systemctl reload nginx
# 7. Setup SSL: sudo certbot --nginx -d YOUR_DOMAIN_HERE

# Shared proxy parameters used in multiple locations.
# Include this block wherever you proxy to Node.js.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP server (certbot will add HTTPS redirect automatically)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # Root directory for static assets only
    # IMPORTANT: Update this path to match your installation
    root /var/www/equiprofile/dist/public;

    # Maximum upload size (matches server-side limit)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/equiprofile-access.log;
    error_log /var/log/nginx/equiprofile-error.log;

    # ── Hashed assets: serve directly from disk (immutable cache) ──────────
    # Files under /assets/ have content-hash suffixes so they are safe to
    # cache forever.  They are pure static bytes; no security headers beyond
    # the ones set by Node.js are needed here.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── Other static assets — try disk first, fall back to Node.js ─────────
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri @node;
    }

    # ── service-worker.js: never cache ────────────────────────────────────
    # Must be served fresh so an updated SW is activated immediately.
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # ── Everything else → Node.js ──────────────────────────────────────────
    # This includes: /, /index.html, all SPA routes (/login, /dashboard, …),
    # /api/*, /trpc/*, /healthz, /build, and any path not matched above.
    #
    # Node.js is responsible for:
    #   • Setting security headers (X-Frame-Options, etc.) via Helmet
    #   • Setting Cache-Control: no-store on HTML responses
    location / {
        # Static CSP header (no nonces — avoids blank screen on SW cache)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / SSE upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Proxy headers for correct IP detection (trust proxy enabled in Node)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for SSE (Server-Sent Events) streams
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Named location for falling back to Node.js from try_files
    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
