# ==========================================
# EquiProfile Canonical Nginx Configuration
# ==========================================
# This is the RECOMMENDED configuration for EquiProfile production deployments.
# 
# Strategy: Proxy ALL requests to Node.js (simplest, most reliable)
# - Node.js serves static files from dist/public/
# - Nginx only handles SSL termination and proxy
# - Avoids path mismatch issues between Nginx and Node.js
#
# CONTENT SECURITY POLICY
# ------------------------
# CSP is served as a static header by Nginx using 'unsafe-inline'.  This is
# intentional: nonce-based CSP was removed because stale nonces in SW-cached
# HTML caused blank white screens after deployments.  'unsafe-inline' allows
# Vite-generated inline scripts and is safe when combined with frame-ancestors.
#
# All other security headers (X-Frame-Options, etc.) are set by Node.js via
# Helmet (server/_core/index.ts).
#
# Cache-Control headers are set by Node.js:
#   • index.html → no-store (always fetch fresh HTML)
#   • /assets/*  → public, max-age=31536000, immutable
#   • service-worker.js → no-store
#
# Installation:
# 1. Replace YOUR_DOMAIN_HERE with your actual domain (e.g., equiprofile.online)
# 2. Copy to: /etc/nginx/sites-available/equiprofile
# 3. Create symlink: sudo ln -s /etc/nginx/sites-available/equiprofile /etc/nginx/sites-enabled/
# 4. Test config: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx
# 6. Setup SSL: sudo certbot --nginx -d yourdomain.com

# HTTP server - redirect to HTTPS (after SSL setup)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # Maximum upload size (matches server-side limit)
    client_max_body_size 50M;

    # Uncomment the line below after SSL is configured
    # return 301 https://$host$request_uri;

    # Temporary: allow HTTP during initial setup
    location / {
        # Static Content-Security-Policy (no nonces — avoids blank screen on SW cache)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / SSE upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy headers for correct IP detection (trust proxy must be enabled in Node)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for SSE (Server-Sent Events) streams
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }
}

