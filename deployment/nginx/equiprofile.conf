# ==========================================
# EquiProfile Nginx Configuration — 2-Domain Setup
# ==========================================
# Serves TWO separate frontends from one Node.js backend:
#
#   equiprofile.online         → Management frontend (dist/public/management/)
#   school.equiprofile.online  → School frontend     (dist/public/school/)
#
# Asset Strategy — Namespaced (Option A, collision-free):
#
#   Each frontend has its own asset URL namespace, set via vite.config.ts
#   build.assetsDir:
#
#     management build → management-assets/  served at /management-assets/
#     school build     → school-assets/      served at /school-assets/
#
#   The management server block's root is dist/public/management/, so Nginx
#   serves /management-assets/ directly from that directory.
#   The school server block's root is dist/public/school/, so Nginx serves
#   /school-assets/ directly from that directory.
#
#   Cross-site asset collisions are structurally impossible:
#   - The two URL namespaces never overlap.
#   - No post-build merge step is used or required.
#
# CONTENT SECURITY POLICY
# ------------------------
# CSP is served as a static header by Nginx using 'unsafe-inline'.  This is
# intentional: nonce-based CSP was removed because stale nonces in SW-cached
# HTML caused blank white screens after deployments.  'unsafe-inline' allows
# Vite-generated inline scripts and is safe when combined with frame-ancestors.
#
# All other security headers (X-Frame-Options, etc.) are set by Node.js via
# Helmet (server/_core/index.ts).
#
# Installation:
# 1. Replace YOUR_DOMAIN_HERE with your actual domain (e.g., equiprofile.online)
# 2. Copy to: /etc/nginx/sites-available/equiprofile
# 3. Create symlink: sudo ln -s /etc/nginx/sites-available/equiprofile /etc/nginx/sites-enabled/
# 4. Test config: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx
# 6. Setup SSL: sudo certbot --nginx -d YOUR_DOMAIN_HERE -d school.YOUR_DOMAIN_HERE
#
# IMPORTANT: Both domains share the same Node.js backend on port 3000.
# Node.js uses the Host header to determine which index.html to serve.
# Nginx MUST forward the Host header correctly (proxy_set_header Host $host).

# Shared proxy parameters
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Management site: equiprofile.online ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # Root points to the management frontend build directory.
    # This means /management-assets/ maps to dist/public/management/management-assets/
    # which is exactly where the management Vite build places its hashed assets.
    root /var/www/equiprofile/dist/public/management;

    # Maximum upload size (matches server-side limit)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/equiprofile-access.log;
    error_log /var/log/nginx/equiprofile-error.log;

    # ── Management hashed assets: serve directly, immutable cache ──────────
    # All management JS/CSS/font files live under /management-assets/.
    # Filenames contain content hashes — safe for immutable cache headers.
    location /management-assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── Favicon ──────────────────────────────────────────────────────────
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ── Static media ─────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri @node;
    }

    # ── Service worker: never cache ──────────────────────────────────────
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # ── Everything else → Node.js ────────────────────────────────────────
    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Explicit per-location limit — ensures the 50 MB cap is honoured even
        # when certbot rewrites the SSL server block and the server-level
        # client_max_body_size directive is not preserved in the 443 block.
        client_max_body_size 50M;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Named location for falling back to Node.js from try_files
    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── School site: school.equiprofile.online ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name school.YOUR_DOMAIN_HERE;

    # Root points to the school frontend build directory.
    # This means /school-assets/ maps to dist/public/school/school-assets/
    # which is exactly where the school Vite build places its hashed assets.
    root /var/www/equiprofile/dist/public/school;

    # Maximum upload size
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/equiprofile-school-access.log;
    error_log /var/log/nginx/equiprofile-school-error.log;

    # ── School hashed assets: serve directly, immutable cache ──────────────
    # All school JS/CSS/font files live under /school-assets/.
    # Filenames contain content hashes — safe for immutable cache headers.
    location /school-assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri @node;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # ── Everything else → Node.js ────────────────────────────────────────
    # Node.js sees Host: school.equiprofile.online and serves school/index.html
    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Explicit per-location limit — honoured even when certbot rewrites the
        # SSL server block and the server-level directive is not preserved.
        client_max_body_size 50M;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
