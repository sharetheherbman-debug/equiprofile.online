name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate package.json
        run: npm run preflight

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        # Pin to a specific release tag instead of @master to avoid unexpected
        # breakage, and set db-repository to the primary GHCR source so the
        # scan does not depend on the mirror.gcr.io mirror (which can return
        # transient 404 errors for the vulnerability DB download).
        uses: aquasecurity/trivy-action@0.30.0
        continue-on-error: true
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          db-repository: "ghcr.io/aquasecurity/trivy-db"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  deploy:
    name: Deploy to Production
    needs: [test, lint, ui-smoke-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

    # Uncomment and configure when ready to deploy
    # - name: Deploy to server
    #   uses: appleboy/ssh-action@master
    #   with:
    #     host: ${{ secrets.DEPLOY_HOST }}
    #     username: ${{ secrets.DEPLOY_USER }}
    #     key: ${{ secrets.DEPLOY_KEY }}
    #     script: |
    #       cd /var/www/equiprofile
    #       git pull origin main
    #       npm ci
    #       npm run build
    #       bash scripts/migrate.sh
    #       sudo systemctl restart equiprofile

  ui-smoke-test:
    name: UI Smoke Test
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers and package
        # `npx playwright install` only downloads the browser binaries.
        # We also need the `playwright` Node.js package in node_modules so
        # that `import { chromium } from "playwright"` resolves at runtime.
        run: |
          npx playwright install chromium --with-deps
          npm install --no-save playwright

      - name: Start server and run UI smoke test
        run: |
          # Start server in background.
          # DATABASE_URL must be non-empty to pass startup env validation;
          # the smoke test only visits public HTML pages so no real DB is used.
          node dist/index.js &
          SERVER_PID=$!

          # Wait for server to be ready (up to 30s)
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Run smoke test
          BASE_URL=http://localhost:3000 node scripts/ui-smoke-test.mjs
          EXIT_CODE=$?

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
        env:
          NODE_ENV: production
          JWT_SECRET: smoke-test-secret-min-32-chars-here
          ADMIN_UNLOCK_PASSWORD: Smoke!CI#Test99
          # Needs to be set (non-empty) to pass startup validation;
          # no actual DB connection is made for public-page smoke tests.
          DATABASE_URL: mysql://smoke:smoke@127.0.0.1:3306/smoke_db
